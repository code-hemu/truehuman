<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>truehuman - Vanilla JS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 720px; margin: 0 auto; color: #1a1a2e; }
    h1 { font-size: 1.5rem; margin-bottom: .5rem; }
    p { color: #555; margin-bottom: 1.25rem; font-size: .875rem; }
    .controls { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    button, select { padding: .5rem 1rem; border-radius: 6px; border: 1px solid #ccc; font-size: .875rem; cursor: pointer; }
    button { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    button:hover { opacity: .85; }
    select { background: #fff; }
    #result { background: #f4f4f8; padding: 1.25rem; border-radius: 10px; font-size: .875rem; }
    .loading { color: #666; }
    .verdict-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .875rem; font-weight: 700; }
    .badge-human { background: #dcfce7; color: #166534; }
    .badge-suspicious { background: #fef9c3; color: #854d0e; }
    .badge-bot { background: #fee2e2; color: #991b1b; }
    .stat { font-size: .875rem; color: #555; }
    .stat strong { color: #1a1a2e; }
    .section { margin-top: .75rem; border-top: 1px solid #e0e0e8; padding-top: .75rem; }
    .section-title { font-weight: 600; margin-bottom: .5rem; font-size: .8125rem; text-transform: uppercase; letter-spacing: .03em; color: #666; }
    .check-row { display: flex; align-items: center; gap: .5rem; padding: .25rem 0; }
    .check-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .check-status-pass { background: #166534; }
    .check-status-suspicious { background: #854d0e; }
    .check-status-fail { background: #991b1b; }
    .evidence { margin-left: 1.25rem; padding: .25rem 0 .25rem .75rem; border-left: 2px solid #ddd; font-size: .8rem; color: #555; }
    .evidence code { background: #e8e8ee; padding: 1px 5px; border-radius: 3px; font-size: .775rem; }
    details { margin-top: .5rem; }
    summary { cursor: pointer; font-weight: 600; color: #666; font-size: .8125rem; }
    pre { background: #1a1a2e; color: #f4f4f8; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: .775rem; line-height: 1.5; tab-size: 2; }
  </style>
</head>
<body>
  <h1>TrueHuman</h1>
  <p>Client-side bot detection. All modes (public / detailed / debug) merged into one view.</p>

  <div class="controls">
    <button id="analyzeBtn">Analyze</button>
    <button id="toggleJson">Show JSON</button>
  </div>

  <div id="result" class="loading">Click <strong>Analyze</strong> to run detection.</div>

  <script src="../../dist/truehuman.min.js"></script>
  <script>
    const resultDiv = document.getElementById("result")
    const analyzeBtn = document.getElementById("analyzeBtn")
    const toggleBtn = document.getElementById("toggleJson")
    let showJson = false
    let lastResult = null

    function renderVerdict(result) {
      const cls = result.verdict === "human" ? "badge-human"
        : result.verdict === "suspicious" ? "badge-suspicious"
        : "badge-bot"
      return `<span class="badge ${cls}">${result.verdict.toUpperCase()}</span>`
    }

    function renderComponentRow(name, entry) {
      const val = typeof entry.value === "object"
        ? `winding:${entry.value.winding} geo:${entry.value.geometry.length}ch text:${entry.value.text.length}ch`
        : `val:${entry.value}`
      return `<div class="check-row">
        <span>${name}</span>
        <span class="stat">${entry.duration.toFixed(2)}ms</span>
        <span class="stat">${val}</span>
      </div>`
    }

    function renderDebug(debug) {
      if (!debug) return ""
      return `<details>
        <summary>Debug Info</summary>
        <div class="evidence">integrityCodes: [${debug.integrityCodes.join(", ")}]</div>
        <div class="evidence">iframeComparisons: ${debug.iframeComparisons}</div>
        <div class="evidence">environmentFlag: ${debug.environmentFlag}</div>
        <div class="evidence">errors: [${debug.errors.join(", ")}]</div>
      </details>`
    }

    function render(result) {
      lastResult = result
      if (showJson) {
        resultDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`
        return
      }
      const comps = Object.entries(result.components).map(([name, entry]) =>
        renderComponentRow(name, entry)
      ).join("")
      const html = `<div class="verdict-row">
        ${renderVerdict(result)}
        <span class="stat">Score: <strong>${result.risk.score}</strong></span>
        <span class="stat">Level: <strong>${result.risk.level}</strong></span>
        <span class="stat">Confidence: <strong>${result.confidence}%</strong></span>
      </div>
      <div class="section">
        <div class="section-title">Checks</div>
        <div class="stat">
          <strong>${result.checks.passed}</strong> passed &middot;
          <strong>${result.checks.suspicious}</strong> suspicious &middot;
          <strong>${result.checks.failed}</strong> failed
        </div>
      </div>
      <div class="section">
        <div class="section-title">Components</div>
        ${comps}
      </div>
      <div class="section">
        <div class="section-title">Debug</div>
        ${renderDebug(result.debug)}
      </div>`
      resultDiv.innerHTML = html
    }

    analyzeBtn.addEventListener("click", () => {
      let result
      try {
        result = truehuman.analyze("debug")
      } catch (e) {
        resultDiv.innerHTML = `<pre style="color:#991b1b">Error: ${e.message}</pre>`
        return
      }
      render(result)
    })

    toggleBtn.addEventListener("click", () => {
      showJson = !showJson
      toggleBtn.textContent = showJson ? "Show Rendered" : "Show JSON"
      if (lastResult) render(lastResult)
    })
  </script>
</body>
</html>
