<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>truehuman - Vanilla JS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 720px; margin: 0 auto; color: #1a1a2e; }
    h1 { font-size: 1.5rem; margin-bottom: .5rem; }
    p { color: #555; margin-bottom: 1.25rem; font-size: .875rem; }
    #result { background: #f4f4f8; padding: 1.25rem; border-radius: 10px; font-size: .875rem; }
    .verdict-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .875rem; font-weight: 700; }
    .badge-human { background: #dcfce7; color: #166534; }
    .badge-suspicious { background: #fef9c3; color: #854d0e; }
    .badge-bot { background: #fee2e2; color: #991b1b; }
    .stat { font-size: .875rem; color: #555; }
    .stat strong { color: #1a1a2e; }
    .section { margin-top: .75rem; border-top: 1px solid #e0e0e8; padding-top: .75rem; }
    .section-title { font-weight: 600; margin-bottom: .5rem; font-size: .8125rem; text-transform: uppercase; letter-spacing: .03em; color: #666; }
    .evidence { margin-left: 1.25rem; padding: .25rem 0 .25rem .75rem; border-left: 2px solid #ddd; font-size: .8rem; color: #555; }
    .evidence code { background: #e8e8ee; padding: 1px 5px; border-radius: 3px; font-size: .775rem; }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #e0e0e8; }
    table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
    thead { background: #eaeaef; }
    th { font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: .04em; font-size: .6875rem; padding: 10px 12px; text-align: left; }
    td { padding: 8px 12px; border-top: 1px solid #e0e0e8; }
    tbody tr { transition: background .15s; }
    tbody tr:nth-child(even) { background: #f0f0f5; }
    tbody tr:hover { background: #e4e4ef; }
    .val-cell { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: .75rem; color: #444; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .duration-cell { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: .75rem; color: #666; text-align: right; white-space: nowrap; }
    details { margin-top: .5rem; }
    summary { cursor: pointer; font-weight: 600; color: #666; font-size: .8125rem; }
    pre { background: #1a1a2e; color: #f4f4f8; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: .775rem; line-height: 1.5; tab-size: 2; }
  </style>
</head>
<body>
  <h1>TrueHuman</h1>
  <p>Client-side bot detection. All modes (public / debug) merged into one view.</p>

  <div id="result"></div>

  <script src="../../dist/truehuman.min.js"></script>
  <script>
    const resultDiv = document.getElementById("result")

    function renderBadge(visitor) {
      const cls = visitor === "human" ? "badge-human"
        : visitor === "suspicious" ? "badge-suspicious"
        : "badge-bot"
      return `<span class="badge ${cls}">${visitor.toUpperCase()}</span>`
    }

    function esc(s) {
      return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    }

    function fmtVal(v) {
      if (v === undefined || v === null) return "—"
      if (typeof v === "boolean") return v
      if (typeof v === "number") return v
      if (typeof v === "string") return v
      if (Array.isArray(v)) return `[${v.length} items]`
      return JSON.stringify(v)
    }

    function renderComponentRow(name, entry) {
      const display = fmtVal(entry.value)
      const full = typeof entry.value === "object" && entry.value !== null && !Array.isArray(entry.value)
        ? Object.entries(entry.value).map(([k, val]) => `${k}: ${fmtVal(val)}`).join(" | ")
        : typeof entry.value === "object"
          ? JSON.stringify(entry.value)
          : String(entry.value)
      return `<tr>
        <td><strong>${name}</strong></td>
        <td class="duration-cell">${entry.duration.toFixed(2)}ms</td>
        <td class="val-cell" title="${esc(full)}">${display}</td>
      </tr>`
    }

    function renderDebug(debug) {
      if (!debug) return ""
      return `<details>
        <summary>Debug Info</summary>
        <div class="evidence">integrityCodes: [${debug.integrityCodes.join(", ")}]</div>
        <div class="evidence">iframeComparisons: ${debug.iframeComparisons}</div>
        <div class="evidence">environmentFlag: ${debug.environmentFlag}</div>
        <div class="evidence">errors: [${debug.errors.join(", ")}]</div>
      </details>`
    }

    function render(result) {
      const comps = Object.entries(result.components).map(([name, entry]) =>
        renderComponentRow(name, entry)
      ).join("")
      const html = `<div class="verdict-row">
        ${renderBadge(result.visitor)}
        <span class="stat">Score: <strong>${result.risk.score}</strong></span>
        <span class="stat">Level: <strong>${result.risk.level}</strong></span>
        <span class="stat">Confidence: <strong>${result.confidence}%</strong></span>
      </div>
      <div class="section">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Component</th><th>Duration</th><th>Value</th></tr>
            </thead>
            <tbody>${comps}</tbody>
          </table>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Debug</div>
        ${renderDebug(result.debug)}
      </div>`
      resultDiv.innerHTML = html
    }

    (async () => {
      try {
        const result = await truehuman.analyze({
          mode: "debug",
          plugins: [
            truehuman.detector.grecaptcha({
              siteKey: "....",
              action: "submit",
              endpoint: "https://recaptcha-backend.com/api/verify?token=",
              threshold: 0.7,
            }),
          ],
          
        })
        render(result)
      } catch (e) {
        resultDiv.innerHTML = `<pre style="color:#991b1b">Error: ${e.message}</pre>`
      }
    })()
  </script>
</body>
</html>
